services:
  frontend:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.local

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3000
